<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messaggio inviato – CartesioSTEM</title>
    <meta name="description" content="Messaggio inviato con successo." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
  </head>
  <body class="min-h-screen bg-[#efefef] text-[#101010] flex flex-col">

    <header class="w-full bg-[#1f2328] border-b border-black/30 shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-5 md:px-10 py-3 md:py-4 flex items-center">
        <a href="/">
          <img src="images/logo.png" alt="Cartesio STEM+ Lab" class="h-11 sm:h-12 md:h-14 w-auto object-contain" />
        </a>
      </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-20">
      <div class="text-center max-w-md">
        <div class="text-6xl mb-6">✅</div>
        <h1 class="text-2xl md:text-3xl font-extrabold uppercase tracking-wide text-[#1f2328] mb-4">
          Messaggio inviato!
        </h1>
        <p class="text-[#444] text-base md:text-lg mb-8 leading-relaxed">
          Grazie per avermi contattato. Ti risponderò il prima possibile.
        </p>
        <a
          href="/"
          class="inline-block bg-[#1f2328] text-white px-8 py-3 font-semibold uppercase tracking-wide hover:bg-[#333] transition-colors"
        >
          Torna alla home
        </a>
      </div>
    </main>

    <footer class="bg-[#1f2328] text-white py-4 text-center text-xs text-white/40">
      © CartesioSTEM
    </footer>

  </body>
</html>
